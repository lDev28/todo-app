<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/style.css">
	<link rel="shortcut icon" type="image/x-icon" href="img/favico.ico">
	<title>Todo App</title>
</head>

<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__body">
				<div id="flexBtn" class="flexBtn">
					<div class="flexBtn__elem"></div>
					<div class="flexBtn__elem"></div>
					<div class="flexBtn__elem"></div>
				</div>
				<div class="header__title">My tasks</div>
				<button class="header__btn">
					<img src="img/Search.png">
				</button>
			</div>
		</header>

		<p class="header__subtitle">Whats on your mind?</p>

		<div class="todoInput">
			<button class="closeBtn"></button>
			<div class="todoInputBlock">
				<p>Todo Title</p>
				<input type="text" id="inputTodo" placeholder="Todo title ...">
				<p>Task</p>
				<input type="text" id="inputTask" placeholder="Write anything in your mind ...">
				<button id="btnAddTodo">Save</button>
			</div>
		</div>

		<div class="todos">
		</div>

		<footer class="footer">
			<button class="add">+</button>
			<button class="footer__btn">
				<div class="material-symbols-rounded">
					home
				</div>
				<p>Home</p>
			</button>
			<button class="footer__btn" id="dayNight">
				<div class="material-symbols-rounded">
					dark_mode
				</div>
				<p>Night light</p>
			</button>
		</footer>
	</div>

	<script src="js/index.js"></script>
</body>

</html>
